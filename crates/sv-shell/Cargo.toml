[package]
name = "sv-shell"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "桌面渲染壳:winit 窗口 + CPU 自绘(softbuffer/tiny-skia/fontdue)"

[dependencies]
sv-reactive = { workspace = true }
sv-ui = { workspace = true }
winit = "0.30"
softbuffer = "0.4"
tiny-skia = "0.11"
fontdue = "0.9"
# GPU 后端(ADR-3b / 调研 14):默认关闭,backend-vello feature 启用。
# wgpu 版本跟随 vello(0.9 → wgpu 29),经 vello::wgpu 再导出使用,不直接依赖
vello = { version = "0.9", optional = true }
pollster = { version = "0.4", optional = true }

[features]
default = []
backend-vello = ["dep:vello", "dep:pollster"]
